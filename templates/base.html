<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Kraft Finans{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="/static/css/style.css" rel="stylesheet">
</head>
<body>

<!-- Ticker bar -->
<div class="ticker-bar d-none d-lg-block">
  <div class="ticker-content" id="tickerContent">
    <span class="ticker-loading">Laster markedsdata...</span>
  </div>
</div>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg kf-navbar">
  <div class="container-fluid px-4">
    <a class="navbar-brand" href="/">
      <img src="/static/img/kraft-finans-logo.svg" alt="Kraft Finans" class="kf-nav-logo">
    </a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMain">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navMain">
      <ul class="navbar-nav ms-auto gap-1 align-items-center">
        <li class="nav-item">
          <a class="nav-link kf-nav-link {% if request.path == '/' %}active{% endif %}" href="/">
            <i class="bi bi-house-door me-1"></i>Hjem
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link kf-nav-link {% if request.path == '/indekser' %}active{% endif %}" href="/indekser">
            <i class="bi bi-graph-up-arrow me-1"></i>Markedsindekser
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link kf-nav-link {% if request.path == '/nyheter' %}active{% endif %}" href="/nyheter">
            <i class="bi bi-newspaper me-1"></i>Finansnyheter
          </a>
        </li>
        <li class="nav-item ms-2">
          <span class="kf-clock" id="clockDisplay"></span>
        </li>
      </ul>
    </div>
  </div>
</nav>

{% block content %}{% endblock %}

<!-- Footer -->
<footer class="kf-footer">
  <div class="container">
    <div class="row align-items-center">
      <div class="col-md-4 text-center text-md-start mb-3 mb-md-0">
        <img src="/static/img/kraft-finans-logo.svg" alt="Kraft Finans" style="height:28px;opacity:0.85">
      </div>
      <div class="col-md-4 text-center mb-3 mb-md-0">
        <small class="text-muted-light">Markedsdata er hentet fra Yahoo Finance og kan ha 15 min forsinkelse</small>
      </div>
      <div class="col-md-4 text-center text-md-end">
        <small class="text-muted-light">© {{ now.year if now else "2026" }} Kraft Finans AS</small>
      </div>
    </div>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="/static/js/app.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
